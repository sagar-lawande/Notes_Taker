<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoginPage</title>
<link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

    <div class="login-container">
        <div class="left-panel">
            <div class="brand-box">
                <div class="logo">✓</div>
                <h1>ToDoPro</h1>
                <p>Welcome back. Manage tasks, deadlines, and productivity in one premium workspace.</p>
            </div>
        </div>

        <div class="right-panel">
            <div class="form-card">
                <h1>Welcome Back</h1>
                <p>Login to continue managing your workflow.</p>

                <form th:action="@{/logForm}" th:object="${user}" method="post">
                    <div th:if="${sucessMsg}" class="success-msg">
                        <h3 style="color:forestgreen;" th:text="${sucessMsg}"></h3>
                    </div>

                    <div th:if="${errMsg}" class="error-msg">
                        <h3 style="color:red;" th:text="${errMsg}"></h3>
                    </div>

                    <input type="email" name="email" placeholder="Enter Email">
                    <input type="password" name="password" placeholder="Enter Password">
                    <input type="submit" value="login">
                </form>
            </div>
        </div>
    </div>

</body>
</html>
